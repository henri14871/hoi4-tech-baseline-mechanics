l_english:

 ###########################################
 # GAME RULES GROUP
 ###########################################
 ARM_RULES_GROUP:0 "Arms Race Mechanics"

 ###########################################
 # GAME RULE 1: arm_auto_research_scope
 ###########################################
 ARM_RULE_auto_research_scope:0 "Auto-Research Scope"
 ARM_RULE_auto_research_scope_desc:0 "Controls which countries receive automatic technology grants based on national power."
 ARM_OPT_AI_ONLY:0 "AI Only"
 ARM_DESC_AI_ONLY:0 "Only AI-controlled countries receive auto-research. Players research manually."
 ARM_OPT_EVERYONE:0 "Everyone"
 ARM_DESC_EVERYONE:0 "All countries including human players receive auto-research."
 ARM_OPT_DISABLED:0 "Disabled"
 ARM_DESC_DISABLED:0 "The auto-research system is completely inactive."

 ###########################################
 # GAME RULE 2: arm_auto_research_intensity
 ###########################################
 ARM_RULE_auto_research_intensity:0 "Auto-Research Intensity"
 ARM_RULE_auto_research_intensity_desc:0 "Controls how quickly nations catch up technologically."
 ARM_OPT_RELAXED:0 "Relaxed"
 ARM_DESC_RELAXED:0 "All lag values increased by 1.0 year. Nations catch up more slowly."
 ARM_OPT_BALANCED:0 "Balanced"
 ARM_DESC_BALANCED:0 "Standard lag values as designed."
 ARM_OPT_AGGRESSIVE:0 "Aggressive"
 ARM_DESC_AGGRESSIVE:0 "All lag values reduced by 0.5 years. Nations catch up faster."
 ARM_OPT_HISTORICAL:0 "Historical Bias"
 ARM_DESC_HISTORICAL:0 "Standard values plus historical competence bonuses for major nations."

 ###########################################
 # GAME RULE 3: arm_compat_profile
 ###########################################
 ARM_RULE_compat_profile:0 "Compatibility Profile"
 ARM_RULE_compat_profile_desc:0 "Auto-detects the active major overhaul or expansion mod by default, with manual profile overrides available when needed."
 ARM_OPT_COMPAT_AUTO:0 "Auto Detect"
 ARM_DESC_COMPAT_AUTO:0 "Automatically select the matching built-in ARM profile for the active supported overhaul. Falls back to vanilla when no supported mod is detected."
 ARM_OPT_COMPAT_VANILLA:0 "Vanilla"
 ARM_DESC_COMPAT_VANILLA:0 "Use the default ARM tech lists and vanilla-scale tier thresholds."
 ARM_OPT_COMPAT_ROAD_TO_56:0 "Road to 56"
 ARM_DESC_COMPAT_ROAD_TO_56:0 "Use the built-in Road to 56 research profile."
 ARM_OPT_COMPAT_KAISERREICH:0 "Kaiserreich"
 ARM_DESC_COMPAT_KAISERREICH:0 "Use the built-in Kaiserreich research profile."
 ARM_OPT_COMPAT_KAISERREDUX:0 "Kaiserredux"
 ARM_DESC_COMPAT_KAISERREDUX:0 "Use the built-in Kaiserredux research profile."
 ARM_OPT_COMPAT_BLACKICE:0 "BlackICE"
 ARM_DESC_COMPAT_BLACKICE:0 "Use the built-in BlackICE research profile."
 ARM_OPT_COMPAT_ENDSIEG:0 "Endsieg"
 ARM_DESC_COMPAT_ENDSIEG:0 "Use the built-in Endsieg research profile."
 ARM_OPT_COMPAT_ETT1960:0 "Extended Tech Tree 1960"
 ARM_DESC_COMPAT_ETT1960:0 "Use the built-in Extended Tech Tree 1960 research profile."
 ARM_OPT_COMPAT_GREAT_WAR:0 "The Great War"
 ARM_DESC_COMPAT_GREAT_WAR:0 "Use the built-in Hearts of Iron IV: The Great War research profile."
 ARM_OPT_COMPAT_GREAT_WAR_REDUX:0 "Great War Redux"
 ARM_DESC_COMPAT_GREAT_WAR_REDUX:0 "Use the built-in Great War Redux research profile."
 ARM_OPT_COMPAT_MILLENNIUM_DAWN:0 "Millennium Dawn"
 ARM_DESC_COMPAT_MILLENNIUM_DAWN:0 "Use the built-in Millennium Dawn research profile."
 ARM_OPT_COMPAT_TNO:0 "The New Order"
 ARM_DESC_COMPAT_TNO:0 "Use the built-in The New Order research profile."
 ARM_OPT_COMPAT_NOVUM_VEXILLUM:0 "Novum Vexillum"
 ARM_DESC_COMPAT_NOVUM_VEXILLUM:0 "Use the built-in Novum Vexillum research profile."
 ARM_OPT_COMPAT_RISE_OF_NATIONS:0 "Rise of Nations"
 ARM_DESC_COMPAT_RISE_OF_NATIONS:0 "Use the built-in Rise of Nations research profile."
 ARM_OPT_COMPAT_CWIC:0 "Cold War Iron Curtain"
 ARM_DESC_COMPAT_CWIC:0 "Use the built-in Cold War Iron Curtain research profile."
 ARM_OPT_COMPAT_TFR:0 "The Fire Rises"
 ARM_DESC_COMPAT_TFR:0 "Use the built-in The Fire Rises research profile."

 ###########################################
 # GAME RULE 4: arm_tech_scope
 ###########################################
 ARM_RULE_tech_scope:0 "Tech Scope"
 ARM_RULE_tech_scope_desc:0 "Controls how broad ARM's tech grants are, from a narrow military-industrial baseline to nearly the full tree."
 ARM_OPT_CORE_ONLY:0 "Core Only"
 ARM_DESC_CORE_ONLY:0 "Only the basic backbone is granted: infantry, artillery, support, and industry. Air, naval, electronics, motorised, mechanised, and tanks stay fully manual."
 ARM_OPT_CORE_AIR_NAVAL:0 "Core + Air/Naval"
 ARM_DESC_CORE_AIR_NAVAL:0 "The default middle ground. Core categories plus air and naval tech are granted, while advanced land branches and electronics remain manual priorities."
 ARM_OPT_ALL_EXCEPT_DOCTRINES:0 "All Except Doctrines"
 ARM_DESC_ALL_EXCEPT_DOCTRINES:0 "Almost the entire tree is covered, including advanced land and electronics. Only doctrines are left out."
 ARM_OPT_EVERYTHING:0 "Everything"
 ARM_DESC_EVERYTHING:0 "The broadest scope. All supported categories are included, including doctrines, nuclear, and rockets where other ARM rules allow them."

 ###########################################
 # GAME RULE 4: arm_doctrine_handling
 ###########################################
 ARM_RULE_doctrine_handling:0 "Doctrine Handling"
 ARM_RULE_doctrine_handling_desc:0 "Controls whether doctrines are automatically granted."
 ARM_OPT_DOC_DISABLED:0 "Disabled"
 ARM_DESC_DOC_DISABLED:0 "Doctrines are never auto-granted. All countries must research doctrines manually."
 ARM_OPT_DOC_AI_ONLY:0 "AI Only"
 ARM_DESC_DOC_AI_ONLY:0 "Only AI-controlled countries receive auto-granted doctrines."
 ARM_OPT_DOC_EVERYONE:0 "Everyone"
 ARM_DESC_DOC_EVERYONE:0 "All countries including human players receive auto-granted doctrines."

 ###########################################
 # GAME RULE 5: arm_advanced_tech
 ###########################################
 ARM_RULE_advanced_tech:0 "Advanced Tech (Nuclear/Rockets)"
 ARM_RULE_advanced_tech_desc:0 "Controls whether nuclear and rocket technologies can be auto-granted."
 ARM_OPT_ADV_EXCLUDED:0 "Excluded"
 ARM_DESC_ADV_EXCLUDED:0 "Nuclear and rocket technologies are never auto-granted."
 ARM_OPT_ADV_SUPERPOWERS:0 "Superpowers Only"
 ARM_DESC_ADV_SUPERPOWERS:0 "Only Superpower-tier nations with industry competence above 85 can receive nuclear and rocket tech."
 ARM_OPT_ADV_INCLUDED:0 "Included"
 ARM_DESC_ADV_INCLUDED:0 "Nuclear and rocket tech can be auto-granted to any nation meeting the competence threshold."

 ###########################################
 # GAME RULE 6: arm_war_faction_catchup
 ###########################################
 ARM_RULE_war_faction_catchup:0 "War & Faction Catch-Up"
 ARM_RULE_war_faction_catchup_desc:0 "Controls war, desperation, and faction bonuses that reduce effective tech lag."
 ARM_OPT_WF_DISABLED:0 "Disabled"
 ARM_DESC_WF_DISABLED:0 "No war, desperation, or faction bonuses are applied."
 ARM_OPT_WF_STANDARD:0 "Standard"
 ARM_DESC_WF_STANDARD:0 "Standard war and faction bonuses. At war: -0.5 lag. Faction with major: -0.5 lag. Desperation at 20%+ surrender: -0.5, at 40%+: -0.75."
 ARM_OPT_WF_ENHANCED:0 "Enhanced"
 ARM_DESC_WF_ENHANCED:0 "Enhanced war and faction bonuses. At war: -1.0 lag. Faction with major: -1.0 lag. Desperation at 10%+ surrender: -0.5, at 20%+: -0.75."

 ###########################################
 # GAME RULE 7: arm_grant_cap
 ###########################################
 ARM_RULE_grant_cap:0 "Grant Cap"
 ARM_RULE_grant_cap_desc:0 "Controls the maximum number of technologies granted per evaluation cycle."
 ARM_OPT_CAP_STRICT:0 "Strict"
 ARM_DESC_CAP_STRICT:0 "Quarterly cap is halved (rounded up). Slower tech spread across all tiers."
 ARM_OPT_CAP_STANDARD:0 "Standard"
 ARM_DESC_CAP_STANDARD:0 "Standard quarterly cap based on tier. Superpower: 6, Great: 5, Regional: 4, Minor Industrial: 3, Minor: 2, Micro: 1."
 ARM_OPT_CAP_UNLIMITED:0 "Unlimited"
 ARM_DESC_CAP_UNLIMITED:0 "No cap on technologies granted per cycle. Nations receive all eligible techs at once."

 ###########################################
 # GAME RULE 8: arm_notifications
 ###########################################
 ARM_RULE_notifications:0 "Notifications"
 ARM_RULE_notifications_desc:0 "Controls which tech grant notifications are shown to the player."
 ARM_OPT_NOTIFY_SILENT:0 "Silent"
 ARM_DESC_NOTIFY_SILENT:0 "No notifications are shown for tech grants."
 ARM_OPT_NOTIFY_MAJOR:0 "Major Only"
 ARM_DESC_NOTIFY_MAJOR:0 "Only major milestone notifications are shown (jet age, nuclear, tier changes)."
 ARM_OPT_NOTIFY_ALL:0 "All"
 ARM_DESC_NOTIFY_ALL:0 "Notifications are shown for every tech grant."

 ###########################################
 # GAME RULE 9: arm_power_visibility
 ###########################################
 ARM_RULE_power_visibility:0 "Power Visibility"
 ARM_RULE_power_visibility_desc:0 "Controls whether power scores and debug information are visible via decisions."
 ARM_OPT_VIS_HIDDEN:0 "Hidden"
 ARM_DESC_VIS_HIDDEN:0 "Power scores and debug decisions are completely hidden."
 ARM_OPT_VIS_OWN:0 "Own Country"
 ARM_DESC_VIS_OWN:0 "You can view your own power score and branch competence via decisions."
 ARM_OPT_VIS_ALL:0 "All (Debug)"
 ARM_DESC_VIS_ALL:0 "Full debug visibility. All ARM decisions are available including force evaluation."

 ###########################################
 # GAME RULE 10: arm_puppet_sharing
 ###########################################
 ARM_RULE_puppet_sharing:0 "Puppet Tech Sharing"
 ARM_RULE_puppet_sharing_desc:0 "Controls whether puppet nations receive tech lag reduction from their overlord."
 ARM_OPT_PUP_DISABLED:0 "Disabled"
 ARM_DESC_PUP_DISABLED:0 "Puppet nations receive no tech lag reduction from their overlord."
 ARM_OPT_PUP_STANDARD:0 "Standard"
 ARM_DESC_PUP_STANDARD:0 "Puppets of Great Powers get -0.5 lag, puppets of Superpowers get -1.0 lag."
 ARM_OPT_PUP_ENHANCED:0 "Enhanced"
 ARM_DESC_PUP_ENHANCED:0 "Increased puppet tech sharing bonuses from overlords."

 ###########################################
 # GAME RULE 11: arm_anti_death_spiral
 ###########################################
 ARM_RULE_anti_death_spiral:0 "Anti-Death Spiral"
 ARM_RULE_anti_death_spiral_desc:0 "Controls the desperation bonus for nations losing territory in war."
 ARM_OPT_ADS_DISABLED:0 "Disabled"
 ARM_DESC_ADS_DISABLED:0 "No desperation bonus. Nations losing territory receive no additional tech catch-up."
 ARM_OPT_ADS_STANDARD:0 "Standard"
 ARM_DESC_ADS_STANDARD:0 "Standard desperation bonus. At 20%+ surrender progress: -0.5 lag, at 40%+: -0.75 lag."
 ARM_OPT_ADS_ENHANCED:0 "Enhanced"
 ARM_DESC_ADS_ENHANCED:0 "Enhanced desperation bonus with lower thresholds. At 10%+ surrender: -0.5 lag, at 20%+: -0.75 lag."

 ###########################################
 # GAME RULE 12: arm_research_speed_bonuses
 ###########################################
 ARM_RULE_research_speed_bonuses:0 "Research Speed Bonuses"
 ARM_RULE_research_speed_bonuses_desc:0 "Controls whether tier and branch national spirits that modify research speed are applied."
 ARM_OPT_RSB_FULL:0 "Full"
 ARM_DESC_RSB_FULL:0 "Both tier spirits (global research speed) and branch spirits (category research bonuses) are applied."
 ARM_OPT_RSB_TIER_ONLY:0 "Tier Only"
 ARM_DESC_RSB_TIER_ONLY:0 "Only tier spirits are applied. Branch competence spirits are removed."
 ARM_OPT_RSB_DISABLED:0 "Disabled"
 ARM_DESC_RSB_DISABLED:0 "All ARM research speed spirits are removed. Tech is granted but no passive research bonuses are given."

 ###########################################
 # TIER SPIRIT NAMES AND DESCRIPTIONS
 ###########################################
 arm_tier_superpower:0 "Superpower"
 arm_tier_superpower_desc:0 "This nation stands at the pinnacle of global power. Research is blazing fast and the technological frontier is within reach."
 arm_tier_great_power:0 "Great Power"
 arm_tier_great_power_desc:0 "This nation is among the world's strongest. Research benefits from extensive institutional knowledge."
 arm_tier_regional_power:0 "Regional Power"
 arm_tier_regional_power_desc:0 "This nation is a significant regional force. Research progresses at a competitive pace."
 arm_tier_minor_industrial:0 "Minor Industrial Power"
 arm_tier_minor_industrial_desc:0 "This nation has a developing industrial base. Research proceeds at standard pace."
 arm_tier_minor:0 "Minor Nation"
 arm_tier_minor_desc:0 "This nation has limited industrial capacity. Research is slower than major powers."
 arm_tier_micro:0 "Micro State"
 arm_tier_micro_desc:0 "This nation has minimal industrial capacity. Research is painfully slow."

 ###########################################
 # LAND BRANCH SPIRIT NAMES AND DESCRIPTIONS
 ###########################################
 arm_land_cutting_edge:0 "Cutting-Edge Land Doctrine"
 arm_land_cutting_edge_desc:0 "This nation's land warfare research infrastructure is world-class, providing significant research bonuses to all land technology categories."
 arm_land_advanced:0 "Advanced Land Capability"
 arm_land_advanced_desc:0 "Strong investment in land warfare yields meaningful research advantages."
 arm_land_standard:0 "Standard Land Capability"
 arm_land_standard_desc:0 "This nation's land warfare research operates at baseline efficiency."
 arm_land_basic:0 "Basic Land Capability"
 arm_land_basic_desc:0 "Limited land warfare infrastructure slows research in land technology categories."
 arm_land_none:0 "Minimal Land Capability"
 arm_land_none_desc:0 "Near-absent land warfare infrastructure severely hampers land technology research."

 ###########################################
 # AIR BRANCH SPIRIT NAMES AND DESCRIPTIONS
 ###########################################
 arm_air_cutting_edge:0 "Cutting-Edge Air Program"
 arm_air_cutting_edge_desc:0 "This nation's aviation research infrastructure is world-class, providing significant research bonuses to all air technology categories."
 arm_air_advanced:0 "Advanced Air Capability"
 arm_air_advanced_desc:0 "Strong investment in aviation yields meaningful research advantages."
 arm_air_standard:0 "Standard Air Capability"
 arm_air_standard_desc:0 "This nation's aviation research operates at baseline efficiency."
 arm_air_basic:0 "Basic Air Capability"
 arm_air_basic_desc:0 "Limited aviation infrastructure slows research in air technology categories."
 arm_air_none:0 "Minimal Air Capability"
 arm_air_none_desc:0 "Near-absent aviation infrastructure severely hampers air technology research."

 ###########################################
 # NAVAL BRANCH SPIRIT NAMES AND DESCRIPTIONS
 ###########################################
 arm_naval_cutting_edge:0 "Cutting-Edge Naval Program"
 arm_naval_cutting_edge_desc:0 "This nation's naval research infrastructure is world-class, providing significant research bonuses to all naval technology categories."
 arm_naval_advanced:0 "Advanced Naval Capability"
 arm_naval_advanced_desc:0 "Strong investment in naval warfare yields meaningful research advantages."
 arm_naval_standard:0 "Standard Naval Capability"
 arm_naval_standard_desc:0 "This nation's naval research operates at baseline efficiency."
 arm_naval_basic:0 "Basic Naval Capability"
 arm_naval_basic_desc:0 "Limited naval infrastructure slows research in naval technology categories."
 arm_naval_none:0 "Minimal Naval Capability"
 arm_naval_none_desc:0 "Near-absent naval infrastructure severely hampers naval technology research."

 ###########################################
 # INDUSTRY BRANCH SPIRIT NAMES AND DESCRIPTIONS
 ###########################################
 arm_industry_cutting_edge:0 "Cutting-Edge Industrial Base"
 arm_industry_cutting_edge_desc:0 "This nation's industrial and electronics research infrastructure is world-class, providing significant research bonuses to all industry technology categories."
 arm_industry_advanced:0 "Advanced Industrial Base"
 arm_industry_advanced_desc:0 "Strong investment in industry and electronics yields meaningful research advantages."
 arm_industry_standard:0 "Standard Industrial Base"
 arm_industry_standard_desc:0 "This nation's industrial research operates at baseline efficiency."
 arm_industry_basic:0 "Basic Industrial Base"
 arm_industry_basic_desc:0 "Limited industrial infrastructure slows research in industry and electronics technology categories."
 arm_industry_none:0 "Minimal Industrial Base"
 arm_industry_none_desc:0 "Near-absent industrial infrastructure severely hampers industry and electronics technology research."

 ###########################################
 # EVENT TITLES, DESCRIPTIONS, AND OPTIONS
 ###########################################

 # arm_event.1 - Major Milestone Tech Grant Notification
 arm_event.1.t:0 "Technological Breakthrough"
 arm_event.1.desc:0 "Our scientists have achieved a major technological milestone. A significant advancement has been made in our research programs, opening new avenues for development."
 arm_event.1.a:0 "Noted."

 # arm_event.2 - Tier Change Notification
 arm_event.2.t:0 "Power Status Changed"
 arm_event.2.desc:0 "Our nation's global standing has shifted. Changes in our industrial output, military strength, and resource base have altered our position in the hierarchy of world powers. Current tier index: [?arm_tier_index]."
 arm_event.2.a:0 "Acknowledged."

 # arm_event.100 - Debug: Power Score Report
 arm_event.100.t:0 "ARM Debug: Power Score Report"
 arm_event.100.desc:0 "Global Power Score: [?arm_global_power]\nEconomy: [?arm_economy_score]\nScience: [?arm_science_score]\nMobilization: [?arm_mobilization_score]\nResources: [?arm_resource_score]\nWar Posture: [?arm_war_posture_score]\nCurrent Tier Index: [?arm_tier_index]"
 arm_event.100.a:0 "Close"

 # arm_event.101 - Debug: Branch Competence Report
 arm_event.101.t:0 "ARM Debug: Branch Competence Report"
 arm_event.101.desc:0 "Land: [?arm_land_competence]\nAir: [?arm_air_competence]\nNaval: [?arm_naval_competence]\nIndustry: [?arm_industry_competence]"
 arm_event.101.a:0 "Close"

 # arm_event.102 - Debug: Effective Lag Report
 arm_event.102.t:0 "ARM Debug: Effective Lag Report"
 arm_event.102.desc:0 "Base Lag: [?arm_base_lag]\n\nEffective Land Lag: [?arm_effective_land_lag]\nEffective Air Lag: [?arm_effective_air_lag]\nEffective Naval Lag: [?arm_effective_naval_lag]\nEffective Industry Lag: [?arm_effective_industry_lag]\n\nTarget Year (Land): [?arm_target_year_land]\nTarget Year (Air): [?arm_target_year_air]\nTarget Year (Naval): [?arm_target_year_naval]\nTarget Year (Industry): [?arm_target_year_industry]\n\nQuarterly Cap: [?arm_quarterly_cap]\nGrants Used: [?arm_grant_counter]"
 arm_event.102.a:0 "Close"

 # arm_event.200 - News: Nation Enters Jet Age
 arm_event.200.t:0 "[FROM.GetName] Enters the Jet Age"
 arm_event.200.desc:0 "[FROM.GetName] has achieved a monumental breakthrough in aviation technology. Their scientists and engineers have successfully developed jet propulsion systems, heralding a new era of aerial warfare and forever changing the balance of power in the skies."
 arm_event.200.a:0 "A new era of aviation begins."

 # arm_event.201 - News: Nuclear Technology Achieved
 arm_event.201.t:0 "[FROM.GetName] Develops Nuclear Technology"
 arm_event.201.desc:0 "[FROM.GetName] has unlocked the secrets of the atom. Their nuclear research program has reached a critical threshold, giving them access to the most devastating weapons ever conceived by mankind. The world will never be the same."
 arm_event.201.a:0 "The atomic age is upon us."

 ###########################################
 # DECISION CATEGORY
 ###########################################
 arm_debug_category:0 "Arms Race Mechanics"
 arm_debug_category_desc:0 "Debug and information decisions for the Arms Race Mechanics system."

 ###########################################
 # DECISION NAMES AND DESCRIPTIONS
 ###########################################
 arm_view_power_score:0 "View Power Score"
 arm_view_power_score_desc:0 "Opens a report showing your nation's global power score and all its component values."
 arm_view_branch_competence:0 "View Branch Competence"
 arm_view_branch_competence_desc:0 "Opens a report showing your nation's branch competence scores for land, air, naval, and industry."
 arm_view_effective_lag:0 "View Effective Lag"
 arm_view_effective_lag_desc:0 "Opens a report showing your nation's effective technology lag per branch, target years, and grant cap."
 arm_force_evaluation:0 "Force Evaluation (Debug)"
 arm_force_evaluation_desc:0 "Manually triggers the full ARM evaluation and tech grant pipeline for your nation. This recalculates scores, assigns tiers, and grants eligible technologies immediately."

